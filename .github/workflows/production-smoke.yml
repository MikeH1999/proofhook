name: Production smoke test

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run smoke:production
        env:
          PROOFHOOK_BASE_URL: https://proofhook-production.up.railway.app
